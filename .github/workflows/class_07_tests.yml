name: class_07_tests

on:
    push:
        paths:
            - 'Python/python-chatgpt-mentoring/class_07/**'
            - '.github/workflows/class_07_tests.yml'
    pull_request:
        paths:
            - 'Python/python-chatgpt-mentoring/class_07/**'
            - '.github/workflows/class_07_tests.yml'

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'

            - name: Install dependencies
              working-directory: Python/python-chatgpt-mentoring
              run: |
                  python -m pip install --upgrade pip
                  pip install -r class_07/requirements-dev.txt
            
            - name: Run tests
              working-directory: Python/python-chatgpt-mentoring
              run: |
                  pytest -q class_07/tests